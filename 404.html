    <style>
      body { display: block; grid-template-columns: none; }
      body::before, body::after { display: block; }

      .void-wrap {
        position: relative;
        z-index: 1;
        min-height: 100svh;
        display: grid;
        place-items: center;
        padding: 2.5rem 1.5rem;
        text-align: center;
      }

      .void-card {
        display: grid;
        gap: 1.25rem;
        justify-items: center;
        max-width: 38rem;
      }

      .void-logo {
        width: min(180px, 50vw);
        height: auto;
        opacity: 0.9;
        filter: drop-shadow(0 6px 24px rgba(0, 0, 0, 0.7));
      }

      .void-code {
        margin: 0.5rem 0 0;
        font-family: var(--mono);
        font-size: 0.66rem;
        letter-spacing: 0.36em;
        text-transform: uppercase;
        color: var(--ember);
      }

      .void-title {
        margin: 0;
        font-family: var(--serif-display);
        font-weight: 700;
        font-size: clamp(2.4rem, 6vw, 4rem);
        letter-spacing: 0.01em;
        line-height: 1;
      }

      .void-title em { font-style: italic; font-weight: 600; color: var(--paper-soft); }

      .void-lede {
        margin: 0 0 0.6rem;
        font-family: var(--serif-body);
        font-style: italic;
        font-size: 1.1rem;
        color: var(--paper-soft);
        line-height: 1.6;
        max-width: 32rem;
      }

      .void-links {
        display: flex;
        flex-wrap: wrap;
        gap: 0.7rem;
        justify-content: center;
        margin-top: 0.5rem;
      }

      .void-link {
        padding: 0.85rem 1.5rem;
        border: 1px solid var(--hair-strong);
        color: var(--paper);
        font-family: var(--serif-display);
        font-weight: 600;
        font-size: 0.9rem;
        letter-spacing: 0.24em;
        text-transform: uppercase;
        background: linear-gradient(180deg, rgba(228,232,242,0.025), transparent);
        transition: border-color 220ms var(--easing), background 220ms var(--easing), transform 220ms var(--easing);
      }

      .void-link:hover {
        border-color: var(--silver-bright);
        transform: translateY(-2px);
      }

      .void-link-primary {
        border-color: var(--ember);
        color: var(--paper);
        background: linear-gradient(135deg, var(--ember-deep), transparent 70%);
      }

      .void-link-primary:hover {
        border-color: var(--ember-bright);
        background: linear-gradient(135deg, var(--ember-deep), var(--ember-glow));
      }
    </style>
  </head>
  <body>
    <main class="void-wrap">
      <div class="void-card">
        <img class="void-logo" src="/assets/img/logo-main.webp" alt="A Funeral Star">
        <p class="void-code">Error · 404</p>
        <h1 class="void-title">This orbit <em>ends</em> here.</h1>
        <p class="void-lede">The page you were looking for has collapsed into something else, or never existed. The rest of the gravity is back home.</p>
        <div class="void-links">
          <a class="void-link void-link-primary" href="/">Back to home</a>
          <a class="void-link" href="/#album-silver">Latest album</a>
          <a class="void-link" href="/lyrics/">All lyrics</a>
          <a class="void-link" href="/#merch">Merch</a>
        </div>
      </div>
    </main>
  </body>
</html>
